services:
  postgres:
    image: postgres:16-alpine
    container_name: lumaspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumaspace
      POSTGRES_PASSWORD: lumaspace
      POSTGRES_DB: lumaspace
    ports:
      - "5432:5432"
    volumes:
      - lumaspace-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumaspace -d lumaspace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumaspace-pgdata:
